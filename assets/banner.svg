<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c16"/>
      <stop offset="1" stop-color="#05060d"/>
    </linearGradient>
    <linearGradient id="b-moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b97ff"/>
      <stop offset="1" stop-color="#5562ff"/>
    </linearGradient>
    <linearGradient id="b-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f6fb"/>
      <stop offset="1" stop-color="#8b97ff"/>
    </linearGradient>
    <filter id="b-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="b-card"><rect x="4" y="4" width="752" height="212" rx="32"/></clipPath>
    <mask id="b-crescent">
      <rect width="220" height="220" fill="black"/>
      <circle cx="96" cy="116" r="46" fill="white"/>
      <circle cx="122" cy="100" r="40" fill="black"/>
    </mask>
  </defs>

  <rect x="4" y="4" width="752" height="212" rx="32" fill="url(#b-bg)" stroke="#1b2036" stroke-width="2"/>

  <g clip-path="url(#b-card)" stroke="#6675ff" stroke-opacity="0.08" stroke-width="1">
    <path d="M4 60H756M4 110H756M4 160H756"/>
    <path d="M120 4V216M240 4V216M360 4V216M480 4V216M600 4V216"/>
  </g>

  <g filter="url(#b-glow)">
    <rect width="220" height="220" fill="url(#b-moon)" mask="url(#b-crescent)"/>
  </g>
  <circle cx="150" cy="74" r="3" fill="#22c55e"/>
  <circle cx="40" cy="150" r="2.5" fill="#00c2ff"/>

  <text x="220" y="108" font-family="Verdana, Geneva, sans-serif" font-size="58" font-weight="700" letter-spacing="2" fill="url(#b-word)" filter="url(#b-glow)">NEON DREAMS</text>
  <text x="222" y="146" font-family="Verdana, Geneva, sans-serif" font-size="20" letter-spacing="1" fill="#858b9d">a dark, structured theme for Obsidian</text>
</svg>
